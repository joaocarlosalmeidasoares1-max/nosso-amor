<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Álbum ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Música -->
    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <!-- Hero -->
    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1>
                Quão abençoado sou por te ter,
                <span>meu amor ❤️</span>
            </h1>

            <p>
                Para minha Girassol,
                minha Princesa,
                minha Linda Flor.
            </p>

            <button id="startBtn">
                ✨ Começar a Jornada
            </button>

        </div>

    </section>

    <section id="capitulos">

        <h2>Nossa História</h2>

        <div class="cards">

            <a href="#momentos" class="card">
                🐾 Nossos Momentos
            </a>

            <a href="#compromisso" class="card">
                💍 Nosso Compromisso
            </a>

            <a href="#aventuras" class="card">
                🌄 Lugares e Aventuras
            </a>

            <a href="#especiais" class="card">
                💧 Momentos Especiais
            </a>

            <a href="#familia" class="card">
                👨‍👩‍👧‍👦 Família
            </a>

        </div>

    </section>

<script src="script.js"></script>

</body>
</html>
