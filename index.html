<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Álbum ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Música -->
    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <!-- Hero -->
    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1>
                Quão abençoado sou por te ter,
                <span>meu amor ❤️</span>
            </h1>

            <p>
                Para minha Girassol,
                minha Princesa,
                minha Linda Flor.
            </p>

            <button id="startBtn">
                ✨ Começar a Jornada
            </button>

        </div>

    </section>

    <section id="capitulos">

        <h2>Nossa História</h2>

        <div class="cards">

            <a href="#momentos" class="card">
                🐾 Nossos Momentos
            </a>

            <a href="#compromisso" class="card">
                💍 Nosso Compromisso
            </a>

            <a href="#aventuras" class="card">
                🌄 Lugares e Aventuras
            </a>

            <a href="#especiais" class="card">
                💧 Momentos Especiais
            </a>

            <a href="#familia" class="card">
                👨‍👩‍👧‍👦 Família
            </a>

        </div>

    </section>
    
<section id="momentos" class="secao">

    <h2>🐾 Nossos Momentos</h2>

    <div class="galeria">

        <div class="foto-card"
             onclick="abrirModal(
             'imgs/auau.jpg',
             '🐶 Au Au',
             'Texto da memória aqui')">

            <img src="imgs/auau.jpg">
            <h3>🐶 Au Au</h3>

        </div>

        <div class="foto-card"
             onclick="abrirModal(
             'imgs/azul.jpg',
             '💙 Nosso Dia de Azul',
             'Texto da memória aqui')">

            <img src="imgs/azul.jpg">
            <h3>💙 Nosso Dia de Azul</h3>

        </div>

        <div class="foto-card"
             onclick="abrirModal(
             'imgs/caretas.jpg',
             '😆 Nossos Momentos Aleatórios',
             'Texto da memória aqui')">

            <img src="imgs/caretas.jpg">
            <h3>😆 Caretas</h3>

        </div>

    </div>

</section>

    <div id="modal" class="modal">

    <div class="modal-content">

        <span class="fechar"
              onclick="fecharModal()">
              ✖
        </span>

        <img id="modal-img">

        <h2 id="modal-titulo"></h2>

        <p id="modal-texto"></p>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
