<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nosso Álbum ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Botão Música -->
    <button id="toggleMusic">🎵</button>

    <!-- Música -->
    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <!-- Banner -->
    <section class="hero">

        <div class="hero-content">

            <h1>
                Quão abençoado sou por te ter,
                <span>meu amor ❤️</span>
            </h1>

            <p>
                Para minha Girassol 🌻,
                minha Princesa 👑,
                minha Linda Flor 💐
            </p>

            <button id="startBtn">
                ✨ Começar a Jornada
            </button>

        </div>

    </section>

    <!-- Capítulos -->

    <section id="capitulos">

        <h2>Nossa História</h2>

        <div class="cards">

            <a href="#momentos" class="card">
                🐾 Nossos Momentos
            </a>

            <a href="#compromisso" class="card">
                💍 Nosso Compromisso
            </a>

            <a href="#aventuras" class="card">
                🌄 Lugares e Aventuras
            </a>

            <a href="#familia" class="card">
                👨‍👩‍👧‍👦 Família
            </a>

            <a href="#carta" class="card">
                💌 Carta Final
            </a>

        </div>

    </section>

    <!-- Modal -->

    <div id="modal" class="modal">

        <div class="modal-content">

            <span class="fechar"
                onclick="fecharModal()">
                ✖
            </span>

            <img id="modal-img">

            <h2 id="modal-titulo"></h2>

            <p id="modal-texto"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
