    <div class="contador-box">

        <div class="tempo">
            <span id="dias">0</span>
            <p>Dias</p>
        </div>

        <div class="tempo">
            <span id="horas">0</span>
            <p>Horas</p>
        </div>

        <div class="tempo">
            <span id="minutos">0</span>
            <p>Minutos</p>
        </div>

        <div class="tempo">
            <span id="segundos">0</span>

        </div>

    </div>

</section>

<!-- Carta -->

    <h2>💌 Carta Final</h2>

    <div class="modal-content">

        <p id="modal-texto"></p>
