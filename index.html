<!-- Nosso Tempo Juntos -->
<section id="contador" class="secao">

    <h2>❤️ Nosso Tempo Juntos</h2>

    <div class="contador-box">

        <div class="tempo">
            <span id="dias">0</span>
            <p>Dias</p>
        </div>

        <div class="tempo">
            <span id="horas">0</span>
            <p>Horas</p>
        </div>

        <div class="tempo">
            <span id="minutos">0</span>
            <p>Minutos</p>
        </div>

        <div class="tempo">
            <span id="segundos">0</span>
            <p>Segundos</p>
        </div>

    </div>

</section>

<!-- Carta -->
<section id="carta" class="secao">

    <h2>💌 Carta Para Minha Girassol</h2>

    <div class="envelope" onclick="abrirCarta()">

        <div class="envelope-frente">
            📩
            <p>Clique para abrir</p>
        </div>

    </div>

    <div id="cartaAberta" class="carta-escondida">

        <h3>Para minha Princesa ❤️</h3>

        <p>
            Aqui ficará sua carta especial...
        </p>

    </div>

</section>

<!-- Modal -->
<div id="modal" class="modal">

    <div class="modal-content">

        <span class="fechar"
              onclick="fecharModal()">
            ✖
        </span>

        <img id="modal-img">

        <h2 id="modal-titulo"></h2>

        <p id="modal-texto"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
